<script>(function(){
  var storageKey='eglise_membre';
  function estInscrit(){try{var m=JSON.parse(localStorage.getItem(storageKey)||'{}');return !!(m.nom&&m.telephone);}catch(e){return false;}}
  function sauver(nom,tel,ville){
    localStorage.setItem(storageKey,JSON.stringify({nom:nom,telephone:tel,ville:ville,date:new Date().toLocaleDateString('fr-FR')}));
    var telKey=tel.replace(/D/g,'');
    if(telKey&&window.fetch){fetch('https://firestore.googleapis.com/v1/projects/eglise-carrefour/databases/(default)/documents/membres/'+encodeURIComponent(telKey)+'?key=AIzaSyBg9wUQyE7gikWOXryjWOuy-3G32tnqZtM',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{nom:{stringValue:nom},telephone:{stringValue:tel},ville:{stringValue:ville},date:{stringValue:new Date().toLocaleDateString('fr-FR')},bloque:{booleanValue:false},timestamp:{timestampValue:new Date().toISOString()}}})}).catch(function(){});}
  }
  function afficher(){
    if(estInscrit()){document.documentElement.style.visibility='visible';document.documentElement.style.overflow='';return;}
    document.documentElement.style.visibility='visible';
    document.documentElement.style.overflow='hidden';
    document.body.style.overflow='hidden';
    var ov=document.createElement('div');
    ov.id='inscription-obligatoire';
    ov.style.cssText='position:fixed;inset:0;background:rgba(10,5,40,0.94);z-index:999999;display:flex;align-items:flex-end;justify-content:center;padding:0';
    ov.innerHTML='<div style="background:linear-gradient(160deg,#0f0c2e,#1a0a3c);border-radius:22px 22px 0 0;padding:26px 20px 34px;width:100%;max-width:480px;border-top:3px solid #f1c40f;box-shadow:0 -12px 40px rgba(0,0,0,.35);font-family:Montserrat,Arial,sans-serif;"><div style="text-align:center;margin-bottom:18px;"><img src="logo.png" alt="Logo" style="width:60px;height:60px;border-radius:14px;border:2px solid rgba(241,196,15,.5);display:block;margin:0 auto 12px;object-fit:cover;"><h2 style="color:#f1c40f;font-size:1.35rem;font-weight:800;margin:0 0 8px;">Inscription requise</h2><p style="color:rgba(255,255,255,.78);font-size:.95rem;line-height:1.6;margin:0;">Veuillez vous inscrire d’abord pour accéder à cette page.</p></div><div style="margin-bottom:12px;"><label style="display:block;color:#f1c40f;font-weight:700;font-size:.9rem;margin-bottom:6px;">Nom complet *</label><input id="gate-inline-nom" type="text" placeholder="Ex: Marie Joseph" style="width:100%;padding:13px 14px;border:2px solid rgba(241,196,15,.3);border-radius:12px;font-size:1rem;color:white;background:rgba(255,255,255,.08);box-sizing:border-box;"></div><div style="margin-bottom:12px;"><label style="display:block;color:#f1c40f;font-weight:700;font-size:.9rem;margin-bottom:6px;">Téléphone *</label><input id="gate-inline-tel" type="tel" placeholder="Ex: +509 3700 0000" style="width:100%;padding:13px 14px;border:2px solid rgba(241,196,15,.3);border-radius:12px;font-size:1rem;color:white;background:rgba(255,255,255,.08);box-sizing:border-box;"></div><div style="margin-bottom:14px;"><label style="display:block;color:#f1c40f;font-weight:700;font-size:.9rem;margin-bottom:6px;">Quartier / Ville</label><input id="gate-inline-ville" type="text" placeholder="Ex: Carrefour" style="width:100%;padding:13px 14px;border:2px solid rgba(241,196,15,.3);border-radius:12px;font-size:1rem;color:white;background:rgba(255,255,255,.08);box-sizing:border-box;"></div><p id="gate-inline-error" style="display:none;color:#ff8a80;font-weight:700;font-size:.9rem;text-align:center;margin:0 0 12px;"></p><button id="gate-inline-btn" type="button" style="width:100%;padding:15px;background:linear-gradient(135deg,#f1c40f,#e67e22);color:#0f0c2e;border:none;border-radius:50px;font-size:1.05rem;font-weight:800;cursor:pointer;">S’inscrire et accéder</button><a href="index.html" style="display:block;text-align:center;color:rgba(255,255,255,.55);font-size:.9rem;margin-top:14px;text-decoration:none;">Retour à l’accueil</a></div>';
    document.body.appendChild(ov);
    document.getElementById('gate-inline-btn').onclick=function(){
      var nom=document.getElementById('gate-inline-nom').value.trim();
      var tel=document.getElementById('gate-inline-tel').value.trim();
      var ville=document.getElementById('gate-inline-ville').value.trim();
      var err=document.getElementById('gate-inline-error');
      if(!nom){err.style.display='block';err.textContent='Veuillez saisir votre nom.';return;}
      if(!tel||tel.replace(/D/g,'').length<8){err.style.display='block';err.textContent='Numéro de téléphone invalide.';return;}
      sauver(nom,tel,ville);
      window.location.reload();
    };
  }
  if(!estInscrit()){document.documentElement.style.visibility='hidden';document.documentElement.style.overflow='hidden';}
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',afficher);}else{afficher();}
})();</script>

  })();

  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: "AIzaSyBg9wUQyE7gikWOXryjWOuy-3G32tnqZtM",
      authDomain: "eglise-carrefour.firebaseapp.com",
      projectId: "eglise-carrefour",
      storageBucket: "eglise-carrefour.firebasestorage.app",
      messagingSenderId: "421333694767",
      appId: "1:421333694767:web:30c18da36ae020821a49da"
    });
  }
  const db = firebase.firestore();

  // État lightbox
  let lbPhotos = [];
  let lbIdx    = 0;

  // ===== TABS =====
  function switchTab(name, btn) {
    document.querySelectorAll('.gallery-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.gallery-section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  // ===== CHARGEMENT =====
  async function chargerGalerie() {
    try {
      const snap  = await db.collection('galerie').orderBy('timestamp', 'desc').get();
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const photos = items.filter(i => i.type !== 'video');
      const videos = items.filter(i => i.type === 'video');
      document.getElementById('countPhotos').textContent = photos.length;
      document.getElementById('countVideos').textContent = videos.length;
      afficherCategories(photos, 'photosContainer', 'photo');
      afficherCategories(videos, 'videosContainer', 'video');
    } catch(e) {
      console.log('Erreur galerie:', e.message);
      document.getElementById('photosContainer').innerHTML =
        '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Erreur de chargement.</p></div>';
    }
  }

  // ===== AFFICHER CATEGORIES (vue principale) =====
  function afficherCategories(items, containerId, type) {
    const container = document.getElementById(containerId);
    if (!items.length) {
      container.innerHTML = `<div class="empty-state">
        <i class="fas fa-${type === 'video' ? 'video' : 'images'}"></i>
        <p>Aucun${type === 'video' ? 'e vidéo' : 'e photo'} publiée pour le moment.</p>
      </div>`;
      return;
    }

    // Grouper par catégorie
    const groupes = {};
    items.forEach(item => {
      const kat = item.kategoriNom || item.categorie || 'Galerie';
      if (!groupes[kat]) groupes[kat] = [];
      groupes[kat].push(item);
    });

    container.innerHTML = `<div class="categories-grid">
      ${Object.entries(groupes).map(([kat, imgs]) => {
        const first   = imgs[0];
        const thumb   = type === 'photo'
          ? (first.url || '')
          : (first.thumb || (first.videoId ? `https://img.youtube.com/vi/${first.videoId}/hqdefault.jpg` : ''));

        return `<div class="kat-card" onclick="ouvrirKategorie('${esc(kat)}', '${type}')">
          <div class="kat-thumb">
            ${thumb
              ? `<img src="${esc(thumb)}" alt="${esc(kat)}" loading="lazy">`
              : `<div class="kat-thumb-placeholder"><i class="fas fa-${type === 'video' ? 'video' : 'images'}"></i></div>`
            }
            ${type === 'video' ? `<div class="kat-thumb-play"><div class="kat-play-btn"><i class="fas fa-play"></i></div></div>` : ''}
            <span class="kat-thumb-count">${imgs.length} ${type === 'video' ? 'vidéo' : 'photo'}${imgs.length > 1 ? 's' : ''}</span>
          </div>
          <div class="kat-info">
            <h3>${esc(kat)}</h3>
            <p>${imgs.length} ${type === 'video' ? 'vidéo' : 'photo'}${imgs.length > 1 ? 's' : ''} — Cliquer pour voir</p>
          </div>
        </div>`;
      }).join('')}
    </div>`;

    // Stocker tous les items groupés pour usage dans le modal
    window._galerie = window._galerie || {};
    window._galerie[type] = groupes;
  }

  // ===== OUVRIR MODAL D'UNE CATEGORIE =====
  function ouvrirKategorie(kat, type) {
    const groupes = window._galerie?.[type] || {};
    const imgs    = groupes[kat] || [];
    if (!imgs.length) return;

    document.getElementById('katModalTitle').textContent = kat;
    document.getElementById('katModalIcon').className    = `fas fa-${type === 'video' ? 'play-circle' : 'images'}`;

    if (type === 'photo') {
      // Stocker photos pour lightbox
      lbPhotos = imgs;

      document.getElementById('katModalBody').innerHTML = `
        <div class="modal-photo-grid">
          ${imgs.map((p, idx) => `
            <div class="modal-photo-item" onclick="ouvrirLightbox(${idx})">
              <img src="${esc(p.url)}" alt="${esc(p.description || '')}" loading="lazy">
              ${p.description ? `<div style="padding:10px 12px;background:white;border-top:1px solid #eee;">
                <p style="margin:0;color:#222;font-size:0.92rem;font-weight:500;">${esc(p.description)}</p>
              </div>` : ''}
            </div>`).join('')}
        </div>`;
    } else {
      document.getElementById('katModalBody').innerHTML = `
        <div class="modal-video-grid">
          ${imgs.map(v => {
            const isYT     = v.videoId || (v.videoUrl && String(v.videoUrl).includes('youtube'));
            const thumb    = v.thumb || (v.videoId ? `https://img.youtube.com/vi/${v.videoId}/hqdefault.jpg` : '');
            const embedUrl = isYT && v.videoId ? `https://www.youtube.com/embed/${v.videoId}?autoplay=1` : '';
            const directUrl= v.videoUrl || v.url || '';
            const onclick  = isYT
              ? `ouvrirVideoYT('${esc(embedUrl)}', '${esc(v.titre || '')}')`
              : `ouvrirVideoDirect('${esc(directUrl)}', '${esc(v.titre || '')}')`;
            return `
            <div class="modal-video-card" onclick="${onclick}">
              <div class="modal-video-thumb">
                ${thumb ? `<img src="${esc(thumb)}" alt="${esc(v.titre || '')}">` : ''}
                <div class="modal-video-play"><div class="modal-video-play-btn"><i class="fas fa-play"></i></div></div>
              </div>
              <div class="modal-video-info">
                <h4>${esc(v.titre || 'Vidéo')}</h4>
                ${v.date ? `<p><i class="fas fa-calendar" style="color:var(--gold);margin-right:4px;"></i>${esc(v.date)}</p>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>`;
    }

    document.getElementById('katModalOverlay').classList.add('open');
    document.getElementById('katModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function fermerKatModal() {
    document.getElementById('katModalOverlay').classList.remove('open');
    document.getElementById('katModal').style.display = 'none';
    document.body.style.overflow = '';
  }

  function closeKatModal(e) {
    if (e.target === document.getElementById('katModalOverlay')) fermerKatModal();
  }

  // ===== LIGHTBOX PHOTO =====
  function ouvrirLightbox(idx) {
    lbIdx = idx;
    majLightbox();
    document.getElementById('lbOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function majLightbox() {
    const p = lbPhotos[lbIdx];
    if (!p) return;
    document.getElementById('lbImg').src       = p.url;
    document.getElementById('lbCaption').textContent = p.description || '';
    document.getElementById('lbCounter').textContent = (lbIdx + 1) + ' / ' + lbPhotos.length;
  }

  function lbNav(dir) {
    lbIdx = (lbIdx + dir + lbPhotos.length) % lbPhotos.length;
    majLightbox();
  }

  function closeLb() {
    document.getElementById('lbOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ===== VIDEO =====
  function ouvrirVideoYT(embedUrl, titre) {
    if (!embedUrl) return;
    document.getElementById('vidFrame').src          = embedUrl;
    document.getElementById('vidFrame').style.display = 'block';
    document.getElementById('vidDirect').style.display= 'none';
    document.getElementById('vidCaption').textContent = titre || '';
    document.getElementById('vidOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function ouvrirVideoDirect(url, titre) {
    if (!url) return;
    document.getElementById('vidDirect').src          = url;
    document.getElementById('vidDirect').style.display = 'block';
    document.getElementById('vidFrame').style.display  = 'none';
    document.getElementById('vidFrame').src            = '';
    document.getElementById('vidCaption').textContent  = titre || '';
    document.getElementById('vidOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeVid() {
    document.getElementById('vidFrame').src         = '';
    document.getElementById('vidDirect').src        = '';
    document.getElementById('vidFrame').style.display  = 'none';
    document.getElementById('vidDirect').style.display = 'none';
    document.getElementById('vidOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ===== UTILS =====
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    if (document.getElementById('lbOverlay').classList.contains('open')) {
      if (e.key === 'Escape')      closeLb();
      if (e.key === 'ArrowRight')  lbNav(1);
      if (e.key === 'ArrowLeft')   lbNav(-1);
    }
    if (document.getElementById('vidOverlay').classList.contains('open') && e.key === 'Escape') closeVid();
    if (document.getElementById('katModal').style.display === 'block' && e.key === 'Escape') fermerKatModal();
  });

  // Click outside lightbox
  document.getElementById('lbOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeLb();
  });
  document.getElementById('vidOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeVid();
  });

  chargerGalerie();
</script>

<script src="pwa.js"></script>
</body>
</html>
