<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie — Église de Dieu de la Prophétie de Carrefour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .page-hero { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 70px 24px 60px; text-align: center; position: relative; overflow: hidden; }
    .page-hero::before { content: '\f03e'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: -30px; top: -30px; font-size: 220px; opacity: 0.04; color: white; }
    .page-hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(241,196,15,0.15); border: 1px solid rgba(241,196,15,0.35); color: var(--gold); padding: 6px 18px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
    .page-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 14px; }
    .page-hero p { font-size: 1.05rem; opacity: 0.82; max-width: 500px; margin: 0 auto; }

    .breadcrumb { background: white; border-bottom: 1px solid var(--border); padding: 12px 24px; }
    .breadcrumb-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-muted); }
    .breadcrumb a { color: var(--text-muted); transition: var(--transition); }
    .breadcrumb a:hover { color: var(--primary); }
    .breadcrumb i { font-size: 0.65rem; color: #bbb; }
    .breadcrumb span { color: var(--primary); font-weight: 600; }

    .galerie-main { max-width: 1200px; margin: 0 auto; padding: 50px 24px 80px; }

    /* Tabs */
    .gallery-tabs { display: flex; gap: 8px; margin-bottom: 36px; background: white; padding: 10px; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border); width: fit-content; }
    .gallery-tab { padding: 10px 22px; border-radius: 10px; border: none; background: transparent; font-family: 'Montserrat', sans-serif; font-size: 0.88rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 7px; }
    .gallery-tab.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
    .gallery-tab i { font-size: 0.85rem; }

    /* Section photos */
    .gallery-section { display: none; }
    .gallery-section.active { display: block; }

    /* Grille masonry-style */
    .photo-grid { columns: 3; column-gap: 16px; margin-bottom: 50px; }
    .photo-item { break-inside: avoid; margin-bottom: 16px; border-radius: var(--radius-sm); overflow: hidden; position: relative; cursor: pointer; }
    .photo-placeholder { background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: rgba(241,196,15,0.4); }
    .photo-placeholder.h1 { height: 200px; }
    .photo-placeholder.h2 { height: 280px; }
    .photo-placeholder.h3 { height: 160px; }
    .photo-overlay { position: absolute; inset: 0; background: rgba(18,18,42,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: var(--transition); color: white; text-align: center; padding: 16px; }
    .photo-overlay i { font-size: 1.8rem; color: var(--gold); }
    .photo-overlay h4 { font-size: 0.9rem; }
    .photo-item:hover .photo-overlay { opacity: 1; }
    .photo-item img { width: 100%; display: block; }

    /* Grille vidéos */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .video-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: var(--transition); }
    .video-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
    .video-thumb { height: 180px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
    .play-btn { width: 56px; height: 56px; background: rgba(241,196,15,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.2rem; padding-left: 4px; transition: var(--transition); }
    .video-thumb:hover .play-btn { transform: scale(1.1); background: var(--gold); }
    .video-body { padding: 20px; }
    .video-body h3 { color: var(--primary); font-size: 0.95rem; margin-bottom: 6px; line-height: 1.4; }
    .video-body p { color: var(--text-muted); font-size: 0.82rem; line-height: 1.5; }
    .video-body .v-date { display: inline-flex; align-items: center; gap: 5px; color: var(--gold); font-size: 0.78rem; font-weight: 600; margin-top: 10px; }

    /* Lightbox simple */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
    .lightbox.open { display: flex; }
    .lightbox-close { position: absolute; top: 20px; right: 24px; color: white; font-size: 2rem; cursor: pointer; opacity: 0.7; transition: var(--transition); background: none; border: none; }
    .lightbox-close:hover { opacity: 1; color: var(--gold); }
    .lightbox-caption { color: var(--gold); font-size: 0.92rem; margin-top: 16px; font-weight: 600; }

    @media (max-width: 768px) {
      .photo-grid { columns: 2; }
      .gallery-tabs { width: 100%; justify-content: center; }
    }
    @media (max-width: 480px) {
      .photo-grid { columns: 1; }
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page-hero">
  <div class="page-hero-badge"><i class="fas fa-images"></i> Galerie</div>
  <h1>Galerie & Vidéos</h1>
  <p>Revivez les moments de grâce et de louange de notre communauté en photos et vidéos.</p>
</div>

<div class="breadcrumb">
  <div class="breadcrumb-inner">
    <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
    <i class="fas fa-chevron-right"></i>
    <a href="Apropos.html">À propos</a>
    <i class="fas fa-chevron-right"></i>
    <span>Galerie</span>
  </div>
</div>

<div class="galerie-main">

  <!-- Tabs -->
  <div class="gallery-tabs">
    <button class="gallery-tab active" data-tab="photos"><i class="fas fa-camera"></i> Photos</button>
    <button class="gallery-tab" data-tab="pasteur"><i class="fas fa-user-tie"></i> Photos Pasteur</button>
    <button class="gallery-tab" data-tab="videos"><i class="fas fa-video"></i> Vidéos</button>
  </div>

  <!-- Section Photos Legliz -->
  <div class="gallery-section active" id="tab-photos">
    <div class="photo-grid" id="photoGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--gold);display:block;margin-bottom:12px;"></i>
        Chargement des photos...
      </div>
    </div>
  </div>

  <!-- Section Photos Pastè -->
  <div class="gallery-section" id="tab-pasteur">
    <div class="photo-grid" id="photoGridPasteur">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--gold);display:block;margin-bottom:12px;"></i>
        Chargement...
      </div>
    </div>
  </div>

  <!-- Section Vidéos -->
  <div class="gallery-section" id="tab-videos">
    <div class="video-grid" id="videoGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--gold);display:block;margin-bottom:12px;"></i>
        Chargement des vidéos...
      </div>
    </div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="" style="max-width:92vw;max-height:80vh;border-radius:10px;object-fit:contain;">
  <p class="lightbox-caption" id="lightboxCaption"></p>
</div>

<!-- Modal vidéo -->
<div class="lightbox" id="videoModal">
  <button class="lightbox-close" onclick="closeVideo()">✕</button>
  <div style="width:min(720px,92vw);">
    <div style="position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;">
      <iframe id="videoFrame" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe>
    </div>
    <p id="videoCaption" style="color:var(--gold);font-size:0.95rem;margin-top:14px;font-weight:600;text-align:center;"></p>
  </div>
</div>

<div id="foot-placeholder"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="nav.js"></script>
<script>
  NAV.init('Galerie.html');

  // ===== FIREBASE =====
  firebase.initializeApp({
    apiKey: "AIzaSyBg9wUQyE7gikWOXryjWOuy-3G32tnqZtM",
    authDomain: "eglise-carrefour.firebaseapp.com",
    projectId: "eglise-carrefour",
    storageBucket: "eglise-carrefour.firebasestorage.app",
    messagingSenderId: "421333694767",
    appId: "1:421333694767:web:30c18da36ae020821a49da"
  });
  const db = firebase.firestore();

  // ===== CHAJE GALERIE =====
  async function chargerGalerie() {
    try {
      const snap = await db.collection('galerie').orderBy('timestamp', 'desc').get();
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      const photosEglise  = items.filter(i => i.type !== 'video' && i.categorie !== 'pasteur');
      const photosPasteur = items.filter(i => i.type !== 'video' && i.categorie === 'pasteur');
      const videos        = items.filter(i => i.type === 'video');

      afficherPhotos(photosEglise,  'photoGrid');
      afficherPhotos(photosPasteur, 'photoGridPasteur');
      afficherVideos(videos);
    } catch(e) {
      console.log('Erreur galerie:', e.message);
      document.getElementById('photoGrid').innerHTML =
        '<p style="grid-column:1/-1;text-align:center;color:#aaa;padding:30px;">Aucune photo pour le moment.</p>';
    }
  }

  function afficherPhotos(photos, gridId) {
    const grid = document.getElementById(gridId);
    if (!photos.length) {
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#aaa;padding:40px;font-size:0.95rem;"><i class="fas fa-images" style="display:block;font-size:2rem;margin-bottom:10px;color:var(--gold);opacity:0.4;"></i>Aucune photo publiée pour le moment.</p>';
      return;
    }
    grid.innerHTML = photos.map(p => `
      <div class="photo-item" onclick="openLightbox('${escHtml(p.url)}', '${escHtml(p.description)}')">
        <img src="${escHtml(p.url)}" alt="${escHtml(p.description)}" loading="lazy"
          onerror="this.parentElement.innerHTML='<div class=\\'photo-placeholder h2\\'><i class=\\'fas fa-image\\'></i></div>'">
        <div class="photo-overlay">
          <i class="fas fa-search-plus"></i>
          <h4>${escHtml(p.description)}</h4>
        </div>
      </div>`).join('');
  }

  function afficherVideos(videos) {
    const grid = document.getElementById('videoGrid');
    if (!videos.length) {
      grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#aaa;padding:40px;font-size:0.95rem;"><i class="fas fa-video" style="display:block;font-size:2rem;margin-bottom:10px;color:var(--gold);opacity:0.4;"></i>Aucune vidéo publiée pour le moment.</p>';
      return;
    }
    grid.innerHTML = videos.map(v => {
      const thumb = v.thumb || (v.videoId ? `https://img.youtube.com/vi/${v.videoId}/hqdefault.jpg` : '');
      const embedUrl = v.videoId ? `https://www.youtube.com/embed/${v.videoId}?autoplay=1` : '';
      return `
        <div class="video-card">
          <div class="video-thumb" onclick="openVideo('${escHtml(embedUrl)}', '${escHtml(v.titre)}')"
            style="${thumb ? `background-image:url('${thumb}');background-size:cover;background-position:center;` : ''}">
            <div class="play-btn"><i class="fas fa-play"></i></div>
          </div>
          <div class="video-body">
            <h3>${escHtml(v.titre)}</h3>
            <p>${escHtml(v.description || '')}</p>
            <span class="v-date"><i class="fas fa-calendar"></i> ${escHtml(v.date || '')}</span>
          </div>
        </div>`; }).join('');
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ===== LIGHTBOX FOTO =====
  function openLightbox(url, caption) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightboxCaption').textContent = caption || '';
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ===== MODAL VIDEO =====
  function openVideo(embedUrl, titre) {
    if (!embedUrl) return;
    document.getElementById('videoFrame').src = embedUrl;
    document.getElementById('videoCaption').textContent = titre || '';
    document.getElementById('videoModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeVideo() {
    document.getElementById('videoFrame').src = '';
    document.getElementById('videoModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ===== TABS =====
  document.querySelectorAll('.gallery-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.gallery-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.gallery-section').forEach(s => s.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeLightbox(); closeVideo(); }
  });
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
  document.getElementById('videoModal').addEventListener('click', function(e) {
    if (e.target === this) closeVideo();
  });

  // Chaje galerie a
  chargerGalerie();
</script>
</body>
</html>
