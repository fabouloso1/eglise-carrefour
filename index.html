<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="version" content="1773839943">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Église de Dieu de la Prophétie de Carrefour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1c1c3c">
  <style>
    /* Popup Style */
    #gate-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 99999;
      display: none; justify-content: center; align-items: center; padding: 20px;
      backdrop-filter: blur(5px);
    }
    .gate-card {
      background: white; padding: 30px; border-radius: 20px;
      width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .gate-input {
      width: 100%; padding: 14px; margin-bottom: 12px;
      border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 16px;
    }
    .gate-btn-submit {
      width: 100%; background: #1c1c3c; color: white; padding: 15px;
      border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;
    }
  </style>
</head>
<body>

  <header style="padding: 15px; background: #1c1c3c; display: flex; justify-content: space-between; align-items: center;">
    <img src="logo.png" alt="Logo" style="height: 40px;">
    <button onclick="openAdmin()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:8px 15px; border-radius:20px; cursor:pointer;">
      <i class="fas fa-user-shield"></i> Admin
    </button>
  </header>

  <div style="text-align: center; padding: 50px 20px; color: white;">
    <h1>Byenvini</h1>
    <button onclick="document.getElementById('gate-overlay').style.display='flex'" class="nav-btn" style="margin-top:20px; padding: 15px 30px; border-radius: 30px; cursor: pointer; background: #f1c40f; border: none; font-weight: bold;">
      Inscription
    </button>
  </div>

  <div id="gate-overlay">
    <div class="gate-card">
        <div id="gate-form">
            <h2 style="color:#1c1c3c; margin-bottom:20px; text-align:center;">Enskripsyon Manm</h2>
            <input type="text" id="gate-nom" class="gate-input" placeholder="Non konplè">
            <input type="tel" id="gate-tel" class="gate-input" placeholder="Nimewo Telefòn">
            <input type="text" id="gate-ville" class="gate-input" placeholder="Adrès ou (Vil/Komin)">
            
            <p id="gate-error" style="color:#e74c3c; display:none; font-size:14px; margin-bottom:10px; text-align:center;"></p>
            
            <button id="gate-btn" onclick="gateSubmit()" class="gate-btn-submit">Anrejistre m</button>
            <button onclick="document.getElementById('gate-overlay').style.display='none'" style="width:100%; background:none; border:none; color:#777; margin-top:10px; cursor:pointer;">Anile</button>
        </div>

        <div id="gate-success" style="display:none; text-align:center; padding:20px;">
            <i class="fas fa-check-circle" style="font-size:60px; color:#2ecc71;"></i>
            <p style="margin-top:15px; font-weight:bold; color:#1c1c3c; font-size:18px;">Enskripsyon Reyisi!</p>
            <button onclick="document.getElementById('gate-overlay').style.display='none'" style="margin-top:20px; padding:10px 25px; border-radius:10px; border:none; background:#1c1c3c; color:white; font-weight:bold; cursor:pointer;">OK</button>
        </div>
    </div>
  </div>

  <script src="gate.js"></script>
</body>
</html>
