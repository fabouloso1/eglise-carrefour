<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — Église de Carrefour</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --primary: #1c1c3c; --gold: #f1c40f; --bg: #f4f6fb; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
    .admin-container { max-width: 800px; margin: auto; }
    .admin-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 5px solid var(--gold); }
    h2 { color: var(--primary); margin-bottom: 15px; font-size: 1.2rem; }
    input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
    button:hover { background: #2a2a5a; }
    .btn-notif { background: var(--gold); color: var(--primary); margin-top: 10px; }
  </style>
</head>
<body>

<div class="admin-container">
  <h1 style="text-align:center; color:var(--primary); margin-bottom:20px;">Tablo Kontwòl Pastè a</h1>

  <div class="admin-card">
    <h2><i class="fas fa-bell"></i> Voye yon Alèt bay Tout Moun</h2>
    <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Mesaj sa a ap parèt sou telefòn tout fidèl yo.</p>
    <input type="text" id="notif-titre" placeholder="Tit Alèt la (Egz: Randevou Lapriyè)">
    <textarea id="notif-mesaj" placeholder="Ekri mesaj la la a..."></textarea>
    <select id="notif-tip">
      <option value="annonce">📢 Senp Anons</option>
      <option value="etude-biblique">📖 Etid Biblik</option>
      <option value="foto">📸 Nouvo Foto</option>
      <option value="video">🎥 Nouvo Videyo</option>
    </select>
    <button class="btn-notif" onclick="voyeAlèt()">
      <i class="fas fa-paper-plane"></i> VOYE ALÈT LA KOUNYE A
    </button>
  </div>

  <p style="text-align:center;"><a href="index.html" style="color:var(--primary); text-decoration:none;">← Tounen sou sit la</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  // Konfigirasyon Firebase (Mwen pran yo nan sw.js ou a)
  const firebaseConfig = {
    apiKey: "AIzaSyBg9wUQyE7gikWOXryjWOuy-3G32tnqZtM",
    authDomain: "eglise-carrefour.firebaseapp.com",
    projectId: "eglise-carrefour",
    storageBucket: "eglise-carrefour.firebasestorage.app",
    messagingSenderId: "421333694767",
    appId: "1:421333694767:web:30c18da36ae020821a49da"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  async function voyeAlèt() {
    const t = document.getElementById('notif-titre').value.trim();
    const m = document.getElementById('notif-mesaj').value.trim();
    const tip = document.getElementById('notif-tip').value;

    if (!t || !m) {
      alert("Pastè, tanpri ranpli Tit ak Mesaj la.");
      return;
    }

    try {
      await db.collection('notifications_push').add({
        title: t,
        body: m,
        type: tip,
        date: new Date().toLocaleString('fr-FR'),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      alert("✅ Alèt la pati! Mèsi Pastè.");
      document.getElementById('notif-titre').value = "";
      document.getElementById('notif-mesaj').value = "";
    } catch (err) {
      console.error(err);
      alert("❌ Gen yon erè, mesaj la pa pati.");
    }
  }
</script>

</body>
</html>
